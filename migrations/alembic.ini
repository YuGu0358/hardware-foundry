# Alembic config — Hardware Foundry
# Run from project root:
#   uv run alembic upgrade head
#   uv run alembic revision --autogenerate -m "describe change"

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8
# sqlalchemy.url is set dynamically in env.py from foundry_api.config

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
