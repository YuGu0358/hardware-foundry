name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check agents apps/api

      - name: Smoke test — API route registration
        run: uv run python -c "from foundry_api.main import app; assert len([r for r in app.routes if hasattr(r,'path') and r.path.startswith('/api/')]) == 7"

      - name: Smoke test — LangGraph compiles
        run: uv run python -c "from foundry_api.workflow import _build_graph; g = _build_graph().compile(); print('graph compiles OK')"

      - name: Alembic offline check
        run: uv run alembic -c migrations/alembic.ini upgrade head --sql > /dev/null

      - name: Pytest collect-only
        run: uv run pytest --collect-only

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
