# Hardware Foundry — Phase 0 baseline stack
# Run: cd infra && docker compose --env-file ../.env up -d
#
# Services exposed on localhost:
#   5432  Postgres (app DB)
#   6379  Redis
#   6333  Qdrant HTTP    6334  Qdrant gRPC
#   9000  MinIO S3       9001  MinIO console
#   4000  LiteLLM gateway
#   3001  Langfuse UI

services:
  postgres:
    image: postgres:16-alpine
    container_name: foundry-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foundry-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: foundry-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s

  minio:
    image: minio/minio:latest
    container_name: foundry-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: foundry-litellm
    depends_on:
      - redis
      - postgres
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000

  langfuse-db:
    image: postgres:16-alpine
    container_name: foundry-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_dev_pw
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:3
    container_name: foundry-langfuse
    depends_on:
      - langfuse-db
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgres://langfuse:langfuse_dev_pw@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: dev-nextauth-secret-change-me
      SALT: dev-salt-change-me
      NEXTAUTH_URL: http://localhost:3001
      TELEMETRY_ENABLED: "false"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  langfuse_pg:
